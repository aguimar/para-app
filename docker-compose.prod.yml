services:
  app:
    image: aguimar/para-app:latest
    container_name: para-app
    restart: always
    volumes:
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=production
    env_file:
      - .env.prod
    networks:
      - para-network
      - caddy-network

volumes:
  uploads_data:

networks:
  para-network:
    driver: bridge
  caddy-network:
    external: true
    name: n8n-docker-caddy_default
