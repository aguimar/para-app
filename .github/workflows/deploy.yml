name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/para-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/para-app:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/para-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/para-app:buildcache,mode=max

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/para-app

            # Pull latest code
            git fetch origin
            git checkout main
            git pull origin main

            # Set image to use from Docker Hub
            export APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/para-app:${{ github.sha }}

            # Pull new image
            docker pull $APP_IMAGE

            # Update docker-compose.prod.yml to use the specific image
            sed -i "s|build: .|image: $APP_IMAGE|g" docker-compose.prod.yml

            # Run migrations
            docker compose -f docker-compose.prod.yml run --rm app npx prisma migrate deploy

            # Restart services
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            # Restore original docker-compose.prod.yml
            git checkout docker-compose.prod.yml

            # Verify deployment
            sleep 5
            echo "✅ Deployment complete"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=20 app
